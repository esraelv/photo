<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=yes">
    <title>Boxing Man | Front View</title>
    <style>
        
        body {
            background: linear-gradient;
            font-family: 'Arial', 'Segoe UI', system-ui, sans-serif;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            margin: 0;
            padding: 20px;
        }

        .card {
            background: white;
            border-radius: 28px;
            padding: 25px 28px 35px;
            max-width: 550px;
            width: 100%;
            text-align: center;
            box-shadow: 10px 20px 35px;
            transition: transform 0.2s ease;
        }

        .card:hover {
            transform: translateY(-3px);
        }

        .container {
            display: flex;
            justify-content: center;
            align-items: center;
            margin-bottom: 15px;
        }

        .tokko {
            width: 100%;
            max-width: 440px;
            height: auto;
            object-fit: cover;
            border-radius: 20px;
            border: 4px solid #ffd700;
            box-shadow: 0 8px 20px ;
            transition: transform 0.2s;
        }

        .tokko:hover {
            transform: scale(1.01);
        }

        .image-title {
            font-family: 'Arial', sans-serif;
            font-weight: bold;
            font-size: 26px;
            margin: 18px 0 8px 0;
            color: #1a1a2e;
            letter-spacing: 1px;
        }

        .IMAGE-view {
            background: #f0f0f0;
            display: inline-block;
            padding: 6px 18px;
            border-radius: 40px;
            font-family: 'Courier New', monospace;
            font-size: 14px;
            font-weight: bold;
            color: #333;
            
        }

        .button-group {
            display: flex;
            gap: 20px;
            justify-content: center;
            margin-top: 25px;
            flex-wrap: wrap;
        }

        .camera-man {
            background-color: #e0e0e0;
            border: none;
            padding: 12px 24px;
            font-size: 16px;
            font-weight: bold;
            border-radius: 50px;
            cursor: pointer;
            color: #1a1a2e;
            transition: background 0.2s, transform 0.1s;
            box-shadow: 0 2px 5px );
        }

        .camera-man:hover {
            background-color: #d0d0d0;
            transform: scale(1.02);
        }

        .properties {
            background-color: #dc2626;
            border: none;
            padding: 12px 24px;
            font-size: 16px;
            font-weight: bold;
            border-radius: 50px;
            cursor: pointer;
            color: white;
            transition: background 0.2s, transform 0.1s;
            box-shadow: 0 2px 5px;
        }

        .properties:hover {
            background-color: #b91c1c;
            transform: scale(1.02);
        }

        .camera-man:active, .properties:active {
            transform: scale(0.98);
        }

    
        .fight-quote {
            background: #fef9e6;
            border-left: 5px solid #ffd700;
            padding: 12px 16px;
            margin: 20px 5px 5px 5px;
            border-radius: 16px;
            font-size: 14px;
            color: #333;
            font-style: italic;
            font-weight: 500;
        }

        .footer {
            font-size: 11px;
            color: #888;
            margin-top: 20px;
            padding-top: 12px;
            border-top: 1px solid #eee;
        }
    </style>
</head>
<body>

<div class="card">

    <div class="container">
        <img src="photo_2025-05-05_12-43-04.jpg" class="tokko" alt="Boxing Man Middle Front View";">
    </div>
    

    <p class="image-title">
        🥊 A BOXING MAN 🥊
    </p>
    
    
    <div class="IMAGE-view">
        📸 400x300 (PX) Front View 👊
    </div>



    <div class="button-group">
        <button class="camera-man" >
            📷 CM: ESRAEL REGASA ✓
        </button>

        <button class="properties" >
            📅 DATE 20/08/2018 &nbsp; EC
        </button>
    </div>

    
    <div class="footer">
        AAAA BBBB CCCC
    </div>
</div>
      
</body>
</html>
